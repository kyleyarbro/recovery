<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShadowPoint Recovery</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 15px;
    }
    .card {
      max-width: 720px;
      margin: 0 auto 15px auto;
      background: #151515;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
    }
    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      font-size: 16px;
      border-radius: 10px;
      box-sizing: border-box;
    }
    input, textarea {
      background: #101010;
      color: #fff;
      border: 1px solid #333;
    }
    button {
      background: #c9a44c;
      color: #111;
      border: none;
      font-weight: bold;
    }
    .muted { color: #bbb; }
    .ok { color: #8be28b; font-weight: bold; }
    .bad { color: #ff7a7a; font-weight: bold; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Recovery Request</h1>
    <div id="topStatus" class="muted">START</div>
  </div>

  <div class="card">
    <input id="defendant_name" placeholder="Defendant Name">
    <input id="last_known_location" placeholder="Last Known Location">
    <input id="case_bond_information" placeholder="Bond / Case Information">
    <input id="requester_name_agency" placeholder="Your Name / Agency">
    <input id="requester_phone" placeholder="Phone Number">
    <textarea id="case_notes" rows="5" placeholder="Case Notes / Additional Info"></textarea>

    <button type="button" onclick="submitRecovery()">Submit Recovery Request</button>

    <div id="msg" class="muted">WAITING</div>
  </div>

  <script>
    var SUPABASE_URL = "https://hulcxftmoazrvkjqqyuk.supabase.co";
    var SUPABASE_KEY = "sb_publishable_yFa3GaBBsHYn-VfK8ivRJQ__vuu_q2T";
    var client = null;

    var topStatus = document.getElementById("topStatus");
    var msg = document.getElementById("msg");

    topStatus.innerText = "SCRIPT RAN";

    if (!window.supabase) {
      topStatus.innerText = "SUPABASE SCRIPT FAILED TO LOAD";
      topStatus.className = "bad";
    } else {
      try {
        client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        topStatus.innerText = "SUPABASE READY";
        topStatus.className = "ok";
      } catch (e) {
        topStatus.innerText = "SUPABASE INIT FAILED: " + e.message;
        topStatus.className = "bad";
      }
    }

    async function submitRecovery() {
      msg.innerText = "BUTTON CLICKED";
      msg.className = "muted";

      if (!client) {
        msg.innerText = "NO SUPABASE CLIENT";
        msg.className = "bad";
        return;
      }

      var payload = {
        defendant_name: document.getElementById("defendant_name").value.trim(),
        last_known_location: document.getElementById("last_known_location").value.trim(),
        case_bond_information: document.getElementById("case_bond_information").value.trim(),
        requester_name_agency: document.getElementById("requester_name_agency").value.trim(),
        requester_phone: document.getElementById("requester_phone").value.trim(),
        case_notes: document.getElementById("case_notes").value.trim(),
        source_page: "recovery_form"
      };

      msg.innerText = "SUBMITTING...";

      try {
        var result = await client
          .from("recovery_requests")
          .insert([payload]);

        if (result.error) {
          msg.innerText = "FAILED: " + result.error.message;
          msg.className = "bad";
          return;
        }

        msg.innerText = "SUBMITTED SUCCESSFULLY";
        msg.className = "ok";

        document.getElementById("defendant_name").value = "";
        document.getElementById("last_known_location").value = "";
        document.getElementById("case_bond_information").value = "";
        document.getElementById("requester_name_agency").value = "";
        document.getElementById("requester_phone").value = "";
        document.getElementById("case_notes").value = "";
      } catch (e) {
        msg.innerText = "ERROR: " + e.message;
        msg.className = "bad";
      }
    }

    window.submitRecovery = submitRecovery;
  </script>

</body>
</html>
